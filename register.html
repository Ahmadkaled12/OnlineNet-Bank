<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء حساب</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:70px">

<h2>إنشاء حساب جديد</h2>

<input id="username" placeholder="اسم المستخدم"><br><br>
<input id="email" placeholder="البريد الإلكتروني"><br><br>
<input id="password" type="password" placeholder="كلمة المرور"><br><br>

<button onclick="register()">إنشاء حساب</button>

<p id="msg"></p>

<script>
function register(){

let username = document.getElementById("username").value;
let email = document.getElementById("email").value;
let password = document.getElementById("password").value;

if(!username || !email || !password){
document.getElementById("msg").innerText = "⚠️ املأ كل الحقول";
return;
}

// جلب كل المستخدمين
let users = JSON.parse(localStorage.getItem("users")) || [];

// إنشاء مستخدم جديد مع رصيد
let newUser = {
username: username,
email: email,
password: password,
balance: 1000
};

users.push(newUser);

// حفظهم
localStorage.setItem("users", JSON.stringify(users));

document.getElementById("msg").innerText = "✅ تم إنشاء الحساب";

setTimeout(()=>{
window.location.href = "login.html";
},1000);

}
</script>

</body>
</html>
