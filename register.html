<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>إنشاء حساب</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:80px">

<h2>إنشاء حساب</h2>

<input id="username" placeholder="اسم المستخدم"><br><br>
<input id="email" placeholder="البريد الإلكتروني"><br><br>
<input id="password" type="password" placeholder="كلمة المرور"><br><br>

<button onclick="register()">إنشاء حساب</button>

<p id="msg"></p>

<script>
function register(){

// جلب القيم
const username = document.getElementById("username").value;
const email = document.getElementById("email").value;
const password = document.getElementById("password").value;

// التحقق
if(username === "" || email === "" || password === ""){
document.getElementById("msg").innerText = "⚠️ يرجى تعبئة كل الحقول";
return;
}

// حفظ البيانات
const user = {
username: username,
email: email,
password: password
};

localStorage.setItem("user", JSON.stringify(user));

// نجاح
document.getElementById("msg").innerText = "✅ تم إنشاء الحساب بنجاح";

// انتقال بعد ثانيتين
setTimeout(() => {
window.location.href = "login.html";
}, 1000);

}
</script>

</body>
</html>
