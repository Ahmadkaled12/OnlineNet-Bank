<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>OnlineNet Bank</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:60px">

<h1>🏦 OnlineNet Bank</h1>

<h2>مرحبًا بك 👋</h2>

<p>رصيدك الحالي:</p>
<h1 id="balance">1000 $</h1>

<button onclick="addMoney()">إضافة 100$</button>
<button onclick="logout()">تسجيل خروج</button>

<script>

let balance = 1000;

function addMoney(){
balance += 100;
document.getElementById("balance").innerText = balance + " $";
}

function logout(){
window.location.href = "login.html";
}

</script>

</body>
</html>
