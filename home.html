<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>OnlineNet Bank PRO</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
}

.nav{
background:#111827;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:#1f2937;
padding:20px;
border-radius:12px;
margin-top:15px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

.green{background:#22c55e;color:white;}
.red{background:#ef4444;color:white;}
.blue{background:#3b82f6;color:white;}

.history{
background:#111827;
padding:10px;
border-radius:8px;
margin-top:5px;
font-size:14px;
}
</style>
</head>

<body>

<div class="nav">
<h2>🏦 OnlineNet PRO</h2>
<div>
<button class="blue" onclick="profile()">Profile</button>
<button class="red" onclick="logout()">Logout</button>
</div>
</div>

<div class="container">

<h2 id="user"></h2>

<div class="card">
<h3>💰 الرصيد</h3>
<h1 id="balance"></h1>
</div>

<div class="card">
<h3>💸 تحويل أموال</h3>

<input id="toUser" placeholder="المستلم">
<input id="amount" type="number" placeholder="المبلغ">

<button class="blue" onclick="transfer()">إرسال</button>
<p id="msg"></p>
</div>

<div class="card">
<h3>📊 سجل العمليات</h3>
<div id="history"></div>
</div>

</div>

<script>

let currentUser = JSON.parse(localStorage.getItem("currentUser"));
let users = JSON.parse(localStorage.getItem("users")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];

// 🔴 حماية الصفحة
if(!currentUser){
window.location.href = "login.html";
}

// عرض البيانات
document.getElementById("user").innerText = "👤 " + currentUser.username;
document.getElementById("balance").innerText = currentUser.balance + " $";

showHistory();

// ==================
// 🟡 تسجيل خروج تلقائي (بعد 60 ثانية بدون حركة)
let lastAction = Date.now();

document.addEventListener("mousemove", resetTimer);
document.addEventListener("keypress", resetTimer);

function resetTimer(){
lastAction = Date.now();
}

setInterval(()=>{
if(Date.now() - lastAction > 60000){
alert("تم تسجيل خروجك بسبب الخمول");
logout();
}
},5000);

// ==================

function transfer(){

let to = document.getElementById("toUser").value;
let amount = Number(document.getElementById("amount").value);

if(!to || amount <= 0){
document.getElementById("msg").innerText="⚠️ بيانات غير صحيحة";
return;
}

if(amount > currentUser.balance){
document.getElementById("msg").innerText="❌ رصيد غير كافي";
return;
}

let receiver = users.find(u => u.username === to);

if(!receiver){
document.getElementById("msg").innerText="❌ المستخدم غير موجود";
return;
}

// خصم
for(let u of users){
if(u.username === currentUser.username){
u.balance -= amount;
currentUser.balance -= amount;
}
}

// إضافة
receiver.balance += amount;

// سجل
history.push({
type:"تحويل",
from:currentUser.username,
to:to,
amount:amount,
date:new Date().toLocaleString()
});

saveAll();
document.getElementById("msg").innerText="✅ تم التحويل";
}

function showHistory(){

let html = "";

history.slice().reverse().forEach(h=>{

if(h.type === "تحويل"){
html += `<div class="history">💸 ${h.from} → ${h.to} | ${h.amount}$ | ${h.date}</div>`;
}else{
html += `<div class="history">➕ ${h.user} أضاف ${h.amount}$ | ${h.date}</div>`;
}

});

document.getElementById("history").innerHTML = html;
}

function saveAll(){
localStorage.setItem("users", JSON.stringify(users));
localStorage.setItem("currentUser", JSON.stringify(currentUser));
localStorage.setItem("history", JSON.stringify(history));

document.getElementById("balance").innerText = currentUser.balance + " $";
showHistory();
}

// 👤 صفحة البروفايل
function profile(){
alert(
"👤 Username: " + currentUser.username +
"\n📧 Email: " + currentUser.email +
"\n💰 Balance: " + currentUser.balance
);
}

// 🚪 تسجيل خروج
function logout(){
localStorage.removeItem("currentUser");
window.location.href="login.html";
}

</script>

</body>
</html>
