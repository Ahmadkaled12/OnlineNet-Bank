<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>OnlineNet Bank - Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0b1220;
color:white;
text-align:center;
}

.card{
background:#1f2937;
padding:20px;
margin:15px;
border-radius:12px;
}

input{
width:80%;
padding:10px;
margin:5px;
border-radius:8px;
border:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin:5px;
}

.blue{background:#3b82f6;color:white;}
.red{background:#ef4444;color:white;}
.green{background:#22c55e;color:white;}
</style>
</head>

<body>

<h2>🏦 لوحة البنك</h2>

<h3 id="user"></h3>
<h1 id="balance"></h1>

<div class="card">
<h3>💸 تحويل أموال</h3>

<input id="toUser" placeholder="المستلم">
<input id="amount" type="number" placeholder="المبلغ">

<button class="blue" onclick="transfer()">إرسال</button>

<p id="msg"></p>
</div>

<button class="red" onclick="logout()">تسجيل خروج</button>

<script>

let currentUser = JSON.parse(localStorage.getItem("currentUser"));
let users = JSON.parse(localStorage.getItem("users")) || [];

if(!currentUser){
window.location.href="login.html";
}

document.getElementById("user").innerText="👤 "+currentUser.username;
document.getElementById("balance").innerText=currentUser.balance+" $";

function transfer(){

let to = document.getElementById("toUser").value;
let amount = Number(document.getElementById("amount").value);

if(amount > currentUser.balance){
document.getElementById("msg").innerText="رصيد غير كافي";
return;
}

let receiver = users.find(u=>u.username===to);

if(!receiver){
document.getElementById("msg").innerText="المستخدم غير موجود";
return;
}

users.forEach(u=>{
if(u.username===currentUser.username){
u.balance-=amount;
currentUser.balance-=amount;
}
});

receiver.balance+=amount;

localStorage.setItem("users",JSON.stringify(users));
localStorage.setItem("currentUser",JSON.stringify(currentUser));

document.getElementById("balance").innerText=currentUser.balance+" $";

document.getElementById("msg").innerText="تم التحويل";
}

function logout(){
localStorage.removeItem("currentUser");
window.location.href="login.html";
}

</script>

</body>
</html>
