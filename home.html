<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>OnlineNet Bank</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:70px">

<h1>🏦 OnlineNet Bank</h1>

<h2>مرحبًا بك</h2>

<h2 id="user"></h2>

<p>رصيدك:</p>
<h1 id="balance"></h1>

<button onclick="addMoney()">إضافة 100$</button>
<button onclick="logout()">تسجيل خروج</button>

<script>

let currentUser = JSON.parse(localStorage.getItem("currentUser"));

if(!currentUser){
window.location.href = "login.html";
}

document.getElementById("user").innerText = currentUser.username;
document.getElementById("balance").innerText = currentUser.balance + " $";

function addMoney(){

let users = JSON.parse(localStorage.getItem("users"));

for(let u of users){
if(u.username === currentUser.username){
u.balance += 100;
currentUser.balance += 100;
}
}

localStorage.setItem("users", JSON.stringify(users));
localStorage.setItem("currentUser", JSON.stringify(currentUser));

document.getElementById("balance").innerText = currentUser.balance + " $";
}

function logout(){
localStorage.removeItem("currentUser");
window.location.href = "login.html";
}

</script>

</body>
</html>
