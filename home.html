<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>OnlineNet Bank</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0f172a;

}

.nav{

padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:#1f2937;
padding:20px;
border-radius:12px;
margin-top:15px;
}

input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:8px;
border:none;
outline:none;
}

button{
padding:10px;
border:none;
border-radius:8px;
cursor:pointer;
margin-top:5px;
}

.green{background:#22c55e;color:white;}
.red{background:#ef4444;color:white;}
.blue{background:#3b82f6;color:white;}

}
</style>
</head>

<body>

<div class="nav">
<h2>🏦 OnlineNet Bank</h2>
<button class="red" onclick="logout()">خروج</button>
</div>

<div class="container">

<h2 id="user"></h2>

<div class="card">
<h3>💰 الرصيد</h3>
<h1 id="balance"></h1>
</div>

<div class="card">
<h3>💸 تحويل أموال</h3>

<input id="toUser" placeholder="اسم المستلم">
<input id="amount" type="number" placeholder="المبلغ">

<button class="blue" onclick="transfer()">إرسال</button>

<p id="msg"></p>
</div>

<div class="card">
<h3>➕ إضافة (اختبار)</h3>
<button class="green" onclick="addMoney()">+100$</button>
</div>

<div class="card">
<h3>📊 سجل العمليات</h3>
<div id="history"></div>
</div>

</div>

<script>

let currentUser = JSON.parse(localStorage.getItem("currentUser"));
let users = JSON.parse(localStorage.getItem("users")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];

// حماية الصفحة
if(!currentUser){
window.location.href = "login.html";
}

document.getElementById("user").innerText = "👤 " + currentUser.username;
document.getElementById("balance").innerText = currentUser.balance + " $";

showHistory();

function addMoney(){

for(let u of users){
if(u.username === currentUser.username){
u.balance += 100;
currentUser.balance += 100;
}
}

history.push({
type:"إضافة",
user:currentUser.username,
amount:100,
date:new Date().toLocaleString()
});

saveAll();
}
