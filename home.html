<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>OnlineNet MAX</title>

<style>
body{
margin:0;
font-family:Arial;
background:#0a0f1c;
color:white;
}

.header{
background:#111827;
padding:15px;
display:flex;
justify-content:space-between;
align-items:center;
position:sticky;
top:0;
}

.container{
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:#1f2937;
padding:18px;
border-radius:14px;
margin-top:15px;
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

input{
width:100%;
padding:12px;
margin:5px 0;
border-radius:10px;
border:none;
outline:none;
}

button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
margin-top:5px;
}

.blue{background:#3b82f6;color:white;}
.green{background:#22c55e;color:white;}
.red{background:#ef4444;color:white;}

.big{
font-size:28px;
font-weight:bold;
}

.history{
background:#111827;
padding:10px;
border-radius:10px;
margin-top:5px;
font-size:13px;
}
</style>
</head>

<body>

<div class="header">
<h2>🏦 OnlineNet MAX</h2>
<div>
<button class="blue" onclick="profile()">Profile</button>
<button class="red" onclick="logout()">Logout</button>
</div>
</div>

<div class="container">

<h3 id="user"></h3>

<div class="card">
<p>💰 رصيدك</p>
<div class="big" id="balance"></div>
</div>

<div class="card">
<h3>💸 تحويل أموال</h3>

<input id="toUser" placeholder="اسم المستخدم">
<input id="amount" type="number" placeholder="المبلغ">

<button class="blue" onclick="transfer()">إرسال</button>
<p id="msg"></p>
</div>

<div class="card">
<h3>📊 سجل العمليات</h3>
<div id="history"></div>
</div>

</div>

<script>

let currentUser = JSON.parse(localStorage.getItem("currentUser"));
let users = JSON.parse(localStorage.getItem("users")) || [];
let history = JSON.parse(localStorage.getItem("history")) || [];

// 🔒 حماية قوية
if(!currentUser){
window.location.href="login.html";
}

document.getElementById("user").innerText = "👤 " + currentUser.username;
document.getElementById("balance").innerText = currentUser.balance + " $";

showHistory();

// =====================

function transfer(){

let to = document.getElementById("toUser").value;
let amount = Number(document.getElementById("amount").value);

if(!to || amount <= 0){
document.getElementById("msg").innerText="⚠️ بيانات غير صحيحة";
return;
}

if(amount > currentUser.balance){
document.getElementById("msg").innerText="❌ رصيد غير كافي";
return;
}

let receiver = users.find(u => u.username === to);

if(!receiver){
document.getElementById("msg").innerText="❌ المستخدم غير موجود";
return;
}

// خصم
users.forEach(u=>{
if(u.username === currentUser.username){
u.balance -= amount;
currentUser.balance -= amount;
}
});

// إضافة
receiver.balance += amount;

// سجل
history.push({
type:"transfer",
from:currentUser.username,
to:to,
amount:amount,
date:new Date().toLocaleString()
});

saveAll();
document.getElementById("msg").innerText="✅ تم التحويل";
}

// =====================

function showHistory(){
let html="";

history.slice().reverse().forEach(h=>{
if(h.type==="transfer"){
html += `<div class="history">💸 ${h.from} → ${h.to} | ${h.amount}$ | ${h.date}</div>`;
}else{
html += `<div class="history">➕ ${h.user} | ${h.amount}$</div>`;
}
});

document.getElementById("history").innerHTML=html;
}

// =====================

function saveAll(){
localStorage.setItem("users",JSON.stringify(users));
localStorage.setItem("currentUser",JSON.stringify(currentUser));
localStorage.setItem("history",JSON.stringify(history));

document.getElementById("balance").innerText=currentUser.balance+" $";
showHistory();
}

// =====================

function profile(){
alert(
"👤 " + currentUser.username +
"\n💰 Balance: " + currentUser.balance +
"\n📧 Email: " + currentUser.email
);
}

function logout(){
localStorage.removeItem("currentUser");
window.location.href="login.html";
}

</script>

</body>
</html>
