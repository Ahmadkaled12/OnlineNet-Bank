<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:70px">

<h2>تسجيل الدخول</h2>

<input id="username" placeholder="اسم المستخدم"><br><br>
<input id="password" type="password" placeholder="كلمة المرور"><br><br>

<button onclick="login()">دخول</button>

<p id="msg"></p>

<script>
function login(){

let username = document.getElementById("username").value;
let password = document.getElementById("password").value;

let users = JSON.parse(localStorage.getItem("users")) || [];

// البحث عن المستخدم
let user = users.find(u => u.username === username && u.password === password);

if(!user){
document.getElementById("msg").innerText = "❌ بيانات غير صحيحة";
return;
}

// حفظ المستخدم الحالي
localStorage.setItem("currentUser", JSON.stringify(user));

document.getElementById("msg").innerText = "✅ تم الدخول";

setTimeout(()=>{
window.location.href = "home.html";
},1000);

}
</script>

</body>
</html>
