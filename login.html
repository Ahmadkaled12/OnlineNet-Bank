<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تسجيل الدخول</title>

<style>
body{
font-family:Arial;
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}

.box{
background:white;
padding:20px;
border-radius:10px;
width:300px;
box-shadow:0 0 10px rgba(0,0,0,.1);
}

input{
width:100%;
padding:10px;
margin:8px 0;
box-sizing:border-box;
}

button{
width:100%;
padding:10px;
background:#0d6efd;
color:white;
border:none;
border-radius:5px;
}
</style>
</head>

<body>

<div class="box">
<h2>تسجيل الدخول</h2>

<input type="text" placeholder="اسم المستخدم">

<input type="password" placeholder="كلمة المرور">

<button>دخول</button>

</div>

</body>
</html>
