<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تسجيل الدخول</title>
</head>

<body style="font-family:Arial;text-align:center;margin-top:80px">

<h2>تسجيل الدخول</h2>

<input id="username" placeholder="اسم المستخدم"><br><br>
<input id="password" type="password" placeholder="كلمة المرور"><br><br>

<button onclick="login()">دخول</button>

<p id="msg"></p>

<script>
function login(){

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

const storedUser = JSON.parse(localStorage.getItem("user"));

// لا يوجد حساب
if(!storedUser){
document.getElementById("msg").innerText = "⚠️ لا يوجد حساب مسجل";
return;
}

// تحقق البيانات
if(username === storedUser.username && password === storedUser.password){

document.getElementById("msg").innerText = "✅ تم تسجيل الدخول بنجاح";

setTimeout(() => {
window.location.href = "home.html";
}, 1000);

}else{
document.getElementById("msg").innerText = "❌ اسم المستخدم أو كلمة المرور غير صحيحة";
}

}
</script>

</body>
</html>
